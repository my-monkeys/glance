name: Build Android

# Manuel (bouton « Run workflow ») ou automatique sur un tag de version.
# Aucun build ne se déclenche sur un simple push de branche.
on:
  workflow_dispatch:
  push:
    tags:
      - "android-v*"

# Nécessaire pour que softprops/action-gh-release crée/édite la release.
permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.6
          cache: true

      - run: flutter pub get

      # Signature de release depuis les secrets GitHub (keystore + mots de passe).
      # Sans ces secrets, le build retomberait sur la clé de debug (cf. build.gradle.kts).
      - name: Configurer la signature release
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_B64" | base64 --decode > android/app/glance-release.jks
          cat > android/key.properties <<EOF
          storePassword=$STORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=glance-release.jks
          EOF

      - run: flutter build apk --release
      - run: flutter build appbundle --release

      - name: Renommer les binaires (noms propres)
        run: |
          cp build/app/outputs/flutter-apk/app-release.apk glance-android.apk
          cp build/app/outputs/bundle/release/app-release.aab glance-android.aab

      - uses: actions/upload-artifact@v4
        with:
          name: glance-android
          path: |
            glance-android.apk
            glance-android.aab

      - name: Attacher à la release (si tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            glance-android.apk
            glance-android.aab
