# Codemagic CI/CD — Glance (app Flutter simple, projet à la racine).
#
# Réplique le pipeline iOS de piloo. Réutilise les ressources Codemagic
# account-level de piloo (aucune régénération) :
#   - intégration App Store Connect API nommée « Personnal »
#   - groupe de variables « ios_signing » (CERTIFICATE_PRIVATE_KEY)
#
# Workflows :
#   - ios-testflight : build IPA signé + upload TestFlight, déclenché par tag vX.Y.Z
#   - ios-pr-check   : flutter analyze + test sur PR (pas de signing)
#
# Runbook : docs/deploy-mobile-ios.md

workflows:
  ios-testflight:
    name: iOS — Build & TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 60

    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: "v*"
          include: true

    environment:
      flutter: 3.44.4
      xcode: latest
      cocoapods: default
      groups:
        - ios_signing # CERTIFICATE_PRIVATE_KEY (certif de distribution, account-level)
      vars:
        BUNDLE_ID: "fr.mymonkey.glance"
        XCODE_WORKSPACE: "Runner.xcworkspace"
        XCODE_SCHEME: "Runner"

    # Intégration ASC API (clé gérée par Codemagic) : auto-fetch cert + profile,
    # upload TestFlight. Même intégration que piloo.
    integrations:
      app_store_connect: Personnal

    scripts:
      - name: Vérifier le format du tag (vX.Y.Z)
        script: |
          set -euo pipefail
          if [[ ! "${CM_TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "❌ Tag invalide : '${CM_TAG}' (attendu vX.Y.Z)" >&2
            exit 1
          fi
          echo "✅ Tag valide : ${CM_TAG}"

      - name: Dériver la version depuis le tag
        # v1.2.3 → pubspec "1.2.3+<build monotone Codemagic>" (unicité App Store).
        script: |
          set -euo pipefail
          VERSION_NAME="${CM_TAG#v}"
          BUILD_NUMBER="${BUILD_NUMBER:-${PROJECT_BUILD_NUMBER:-1}}"
          echo "VERSION_NAME=${VERSION_NAME} · BUILD_NUMBER=${BUILD_NUMBER}"
          sed -i.bak -E "s/^version: .*/version: ${VERSION_NAME}+${BUILD_NUMBER}/" pubspec.yaml
          grep "^version:" pubspec.yaml

      - name: Dépendances Flutter
        script: flutter pub get

      - name: Analyse statique
        script: flutter analyze --no-fatal-infos

      - name: Tests
        script: flutter test

      - name: Provisionner le certificat + profil de distribution
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "${BUNDLE_ID}" \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles

      - name: Build IPA (release, signé)
        script: |
          flutter build ipa --release \
            --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        # Pas de beta_groups tant qu'un groupe n'est pas créé dans App Store
        # Connect (référencer un groupe inexistant fait échouer la publication).
        # Pas de submit_to_app_store : promotion App Store manuelle (review).

  ios-pr-check:
    name: iOS — PR check (analyze + test)
    instance_type: mac_mini_m2
    max_build_duration: 30
    triggering:
      events:
        - pull_request
      cancel_previous_builds: true
    environment:
      flutter: 3.44.4
    scripts:
      - name: Dépendances Flutter
        script: flutter pub get
      - name: Analyse statique
        script: flutter analyze --no-fatal-infos
      - name: Tests
        script: flutter test
